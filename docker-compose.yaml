services:
  supadash-api:
    build: .
    image: supadash/api:latest
    healthcheck:
      test:
        - CMD
        - curl
        - '-sSfL'
        - '-o'
        - /dev/null
        - 'http://127.0.0.1:8080/v1/health'
      timeout: 5s
      interval: 10s
      retries: 5
    depends_on:
      supadash-db:
        condition: service_healthy
    environment:
      - SERVICE_URL_SUPADASHAPI_8080
      - 'DATABASE_URL=postgres://postgres:${SERVICE_PASSWORD_POSTGRES}@supadash-db:5432/${POSTGRES_DB:-supadash}'
      - 'JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'ENCRYPTION_SECRET=${SERVICE_PASSWORD_ENCRYPTION}'
      - 'ALLOW_SIGNUP=${ALLOW_SIGNUP:-true}'
      - 'ALLOWED_ORIGINS=${SERVICE_URL_SUPADASHAPI}'
      - 'RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}'
      - 'DOMAIN_STUDIO_URL=${SERVICE_URL_SUPADASHAPI}'
      - 'DOMAIN_BASE=${DOMAIN_BASE:-supadash.local}'
      - 'SERVICE_VERSION_URL=${SERVICE_VERSION_URL:-https://supamanager.io/updates}'
      - 'PROVISIONING_ENABLED=${PROVISIONING_ENABLED:-true}'
      - 'PROVISIONING_DOCKER_HOST=${PROVISIONING_DOCKER_HOST:-unix:///var/run/docker.sock}'
      - 'PROVISIONING_PROJECTS_DIR=${PROVISIONING_PROJECTS_DIR:-./projects}'
      - 'PROVISIONING_BASE_POSTGRES_PORT=${PROVISIONING_BASE_POSTGRES_PORT:-5433}'
      - 'PROVISIONING_BASE_KONG_HTTP_PORT=${PROVISIONING_BASE_KONG_HTTP_PORT:-54321}'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'supadash-projects:/app/projects'

  supadash-db:
    image: 'postgres:15-alpine'
    healthcheck:
      test: 'pg_isready -U postgres -h 127.0.0.1'
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'POSTGRES_DB=${POSTGRES_DB:-supadash}'
    volumes:
      - 'supadash-db-data:/var/lib/postgresql/data'

volumes:
  supadash-db-data:
  supadash-projects:
